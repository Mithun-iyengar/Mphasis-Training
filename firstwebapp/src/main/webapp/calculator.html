<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculator page</title>
</head>
<body>

	<form action="Calculator" method="post">
		<h3>Calculator Form</h3>

		<label>Enter Number 1:</label> <input type="number" name="num1"
			required><br> <br> <label>Enter Number 2:</label> <input
			type="number" name="num2" required><br> <br>

		<h4>Select Operation:</h4>

		<label> <input type="radio" name="operation" value="add"
			required> Addition 
		</label><br> <label> <input type="radio" name="operation"
			value="sub"> Subtraction 
		</label><br> <label> <input type="radio" name="operation"
			value="mul"> Multiplication 
		</label><br> <label> <input type="radio" name="operation"
			value="div"> Division 
		</label><br> <br>

		<button type="submit"><b>Calculate</b></button>
	</form>
</body>
</html>
